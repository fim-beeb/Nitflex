<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitflex</title>
    <link rel="stylesheet" href="style.css">
    <script>
        function toggleBlinkAnimation() {
            const body = document.body;
            body.classList.toggle('blink-off');
        }
    </script>
</head>
<body>
    <nav>
        <h1>NITFLEX</h1>
    </nav>
    <section>
        <div class="mov">
            <h2>My list</h2>
            <div class="movlist">
                <button class="mov1" tabindex="0">
                    <img src="image/mov1.jpg" alt="mov1">
                    <div class="movinfo">
                        <p>ชื่อเรื่อง : ประกายฝัน วันพรุ่งนี้ Sparks of Tomorrow Key Visual</p>
                        <p>ประเภท : Sci-Fi, Steampunk, Drama, Romance, Historical</p>
                        <p>เรื่องย่อ : เล่าเรื่องราวในเกียวโตยุคต้นศตวรรษที่ 20 โลกที่ใช[...]</p>
                        <div class="btngroup">
                            <div class="morebtn">More info</div>
                            <div class="favbtn">Favorite</div>
                        </div>
                    </div>
                </button>
                <button class="mov2" tabindex="0">
                    <img src="image/mov2.jpg" alt="mov2">
                    <div class="movinfo">
                        <p>ชื่อเรื่อง : ปริซึมแห่งรัก Love Through a Prism</p>
                        <p>ประเภท : สืบสวนสอบสวน, ประวัติศาสตร์, การแพทย์, โรแมนติกคอมเมด[...]</p>
                        <p>เรื่องย่อ : เรื่องราวของ "เมาเมา" เด็กสาวหมอยาจากย่านเริงรมย์[...]</p>
                        <div class="btngroup">
                            <div class="morebtn">More info</div>
                            <div class="favbtn">Favorite</div>
                        </div>
                    </div>
                </button>
                <button class="mov3" tabindex="0">
                    <img src="image/mov3.jpg" alt="mov3">
                    <div class="movinfo">
                        <p>ชื่อเรื่อง : ปริซึมแห่งรัก Love Through a Prism</p>
                        <p>ประเภท : โรแมนติก, ย้อนยุค, ดราม่า, ศิลปะ</p>
                        <p>เรื่องย่อ : "ลิลี่ อิจิโจอิน" เด็กสาวผู้มุ่งมั่นจากญี่ปุ่น ตั[...]</p>
                        <div class="btngroup">
                            <div class="morebtn">More info</div>
                            <div class="favbtn">Favorite</div>
                        </div>
                    </div>
                </button>
            </div>
            
        </div>
        
    </section>

    <button class="toggle-blink" tabindex="0" onclick="toggleBlinkAnimation()" title="เปิด/ปิดการกระพริบ">⚡</button>

    <footer>coppy right &copy; fimสุดหล่อ 2026</footer>
</body>
</html>
