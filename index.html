<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitflex</title>
    <link rel="stylesheet" href="style.css">
    <script>

    </script>
</head>
<body>
    <nav>
        <h1>NITFLEX</h1>
    </nav>
    <section>
        <div class="mov">
            <h2>My list</h2>
            <div class="movlist">
                <button class="mov1" tabindex="0">
                    <img src="image/mov1.jpg" alt="mov1">
                    <div class="movinfo">
                        <p>ชื่อเรื่อง : ประกายฝัน วันพรุ่งนี้ Sparks of Tomorrow Key Visual</p>
                        <p>ประเภท : Sci-Fi, Steampunk, Drama, Romance, Historical</p>
                        <p>เรื่องย่อ : เล่าเรื่องราวในเกียวโตยุคต้นศตวรรษที่ 20 โลกที่ใช้แต่เครื่องจักรไอน้ำจนปกคลุมไปด้วยเขม่าควัน สองหนุ่มสาวผู้ฝันถึง "ยุคแห่งไฟฟ้า" ได้มาพบกันระหว่างออกตามหาบันทึกความฝัน นำไปสู่การผจญภัยเพื่อเปลี่ยนผ่านสู่ยุคใหม่</p>
                        <div class="btngroup">
                            <div class="morebtn">More info</div>
                            <div class="favbtn">Favorite</div>
                        </div>
                    </div>
                </button>
                <button class="mov2" tabindex="0">
                    <img src="image/mov2.jpg" alt="mov2">
                    <div class="movinfo">
                        <p>ชื่อเรื่อง : ปริซึมแห่งรัก Love Through a Prism</p>
                        <p>ประเภท : สืบสวนสอบสวน, ประวัติศาสตร์, การแพทย์, โรแมนติกคอมเมดี้</p>
                        <p>เรื่องย่อ : เรื่องราวของ "เมาเมา" เด็กสาวหมอยาจากย่านเริงรมย์ที่ถูกลักพาตัวมาเป็นสาวรับใช้ในวังหลัง เธอตั้งใจจะอยู่อย่างเงียบเชียบ แต่ความรู้เรื่องสมุนไพรและยาพิษทำให้เธอเผลอไปช่วยชีวิตพระราชธิดาจาก "คำสาป" จนความจริงเปิดเผย และไปเตะตา "จินชิ" ขันทีหนุ่มรูปงามผู้ทรงอิทธิพล เมาเมาจึงถูกแต่งตั้งเป็นคนสนิทและผู้ชิมพิษของพระสนมเอก นำไปสู่การใช้ไหวพริบและวิชาแพทย์เพื่อคลี่คลายสารพัดคดีปริศนาและการชิงดีชิงเด่นในราชสำนัก</p>
                        <div class="btngroup">
                            <div class="morebtn">More info</div>
                            <div class="favbtn">Favorite</div>
                        </div>
                    </div>
                </button>
                <button class="mov3" tabindex="0">
                    <img src="image/mov3.jpg" alt="mov3">
                    <div class="movinfo">
                        <p>ชื่อเรื่อง : ปริซึมแห่งรัก Love Through a Prism</p>
                        <p>ประเภท : โรแมนติก, ย้อนยุค, ดราม่า, ศิลปะ</p>
                        <p>เรื่องย่อ : "ลิลี่ อิจิโจอิน" เด็กสาวผู้มุ่งมั่นจากญี่ปุ่น ตัดสินใจบินลัดฟ้ามาเรียนศิลปะที่กรุงลอนดอนในช่วงต้นศตวรรษที่ 20 เพื่อพิสูจน์ตัวเอง ที่นั่นเธอได้พบกับ "คิท" อัจฉริยะด้านการวาดภาพผู้แสนเย็นชา จากคู่แข่งที่ตั้งเป้าจะเอาชนะ กลับกลายเป็นการร่วมมือและการเรียนรู้เพื่อเปิดใจให้กัน ท่ามกลางบรรยากาศสุดคลาสสิก เรื่องราวความรัก มิตรภาพ และการไล่ตามความฝันของเหล่าศิลปินรุ่นใหม่จึงเริ่มต้นขึ้น</p>
                        <div class="btngroup">
                            <div class="morebtn">More info</div>
                            <div class="favbtn">Favorite</div>
                        </div>
                    </div>
                </button>
            </div>
            
        </div>
        
    </section>

    <footer>coppy right &copy; fimสุดหล่อ 2026</footer>
</body>
</html>
